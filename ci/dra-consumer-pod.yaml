---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: dra-test-claim
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: kmm-ci-test-device
---
apiVersion: v1
kind: Pod
metadata:
  name: dra-consumer
spec:
  # Prefer the node WITHOUT the DRA device. This ensures that if the pod
  # still lands on minikube (the node with the device), it is because DRA
  # scheduling overrode the node preference — not scheduler coincidence.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - minikube-m02
  containers:
  - name: consumer
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: dra-test-claim
