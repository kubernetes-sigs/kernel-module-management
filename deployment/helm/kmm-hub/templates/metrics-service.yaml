apiVersion: v1
kind: Service
metadata:
  name: {{ include "kmm-hub.namePrefix" . }}controller-metrics-service
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: controller
    {{- include "kmm-hub.labels" . | nindent 4 }}
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    control-plane: controller
    {{- include "kmm-hub.selectorLabels" . | nindent 4 }}
