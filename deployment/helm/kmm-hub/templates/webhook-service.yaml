apiVersion: v1
kind: Service
metadata:
  name: {{ include "kmm-hub.namePrefix" . }}webhook-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: webhook-service
    app.kubernetes.io/created-by: kernel-module-management
    {{- include "kmm-hub.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    control-plane: webhook-server
    {{- include "kmm-hub.selectorLabels" . | nindent 4 }}
