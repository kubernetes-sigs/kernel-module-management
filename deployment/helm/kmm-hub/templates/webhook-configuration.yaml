apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "kmm-hub.namePrefix" . }}validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: "{{ .Release.Namespace }}/{{ include "kmm-hub.namePrefix" . }}serving-cert"
  labels:
    {{- include "kmm-hub.labels" . | nindent 4 }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "kmm-hub.namePrefix" . }}webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-hub-kmm-sigs-x-k8s-io-v1beta1-managedclustermodule
  failurePolicy: Fail
  name: vmanagedclustermodule.kb.io
  rules:
  - apiGroups:
    - hub.kmm.sigs.x-k8s.io
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - managedclustermodules
  sideEffects: None
